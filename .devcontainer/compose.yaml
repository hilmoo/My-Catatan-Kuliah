services:
  workspace:
    image: ghcr.io/hilmoo/containers/my-devcontainer:v0.3.0
    volumes:
      - ../..:/workspaces:cached
    command: sleep infinity
  db:
    image: pgvector/pgvector:pg18-trixie
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mycatatankuliah
    volumes:
      - my-catatan-kuliah-postgres:/var/lib/postgresql/18/docker
    network_mode: service:workspace
  nats:
    image: nats:2.12-alpine
    network_mode: service:workspace
    volumes:
      - my-catatan-kuliah-nats:/data
    command: -js -sd /data

volumes:
  my-catatan-kuliah-postgres:
  my-catatan-kuliah-nats: