version: "2"
sql: 
  - engine: "postgresql"
    queries: "internal/store/sql"
    schema: "../migration"
    gen:
      go:
        package: "db"
        out: "internal/gen/sqlc"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"