          headers: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: internal_server_error
                message: An unexpected error occurred.
          headers: {}
      security:
        - cookieAuth: []
    delete:
