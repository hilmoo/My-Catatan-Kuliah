components:
  schemas:
    DayOfWeek:
      type: string
      enum:
        - monday
        - tuesday
        - wednesday
        - thursday
        - friday
        - saturday
        - sunday
    AssignmentStatus:
      type: string
      enum:
        - pending
        - in_progress
        - submitted
        - graded
        - overdue
    PaginationMeta:
      type: object
      required:
        - page
        - limit
        - total
        - total_pages
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 42
        total_pages:
          type: integer
          example: 3
    ErrorResponse:
      type: object
      required:
        - error
        - status
        - reason
        - id
        - code
        - details
      properties:
        id:
          type: string
        reason:
          type: string
        status:
          type: string
          example: The requested resource could not be found.
        error:
          type: string
          example: not_found
        code:
          type: integer
        details:
          type: object
          properties: {}
          additionalProperties: true
    UserResponse:
      type: object
      required:
        - id
        - username
        - email
        - created_at
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: johndoe
        email:
          type: string
          format: email
          example: john@example.com
        created_at:
          type: string
          format: date-time
          example: '2026-01-15T08:30:00Z'
    UserRegisterRequest:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          example: johndoe
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: s3cr3tP@ss
    UserUpdateRequest:
      type: object
      minProperties: 1
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          format: password
          example: s3cr3tP@ss
    UserListResponse:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/UserResponse'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    WorkspaceResponse:
      type: object
      required:
        - id
        - name
        - owner_id
        - created_at
      properties:
        id:
          type: integer
          example: 10
        name:
          type: string
          example: CS 2026
        owner_id:
          type: integer
          description: ID of the owning user
          example: 1
        owner:
          $ref: '#/components/schemas/UserResponse'
          description: Embedded owner (present when expanded)
        created_at:
          type: string
          format: date-time
          example: '2026-01-20T09:00:00Z'
    WorkspaceCreateRequest:
      type: object
      required:
        - name
        - owner_id
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          example: CS 2026
        owner_id:
          type: integer
          example: 1
    WorkspaceUpdateRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
    WorkspaceListResponse:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/WorkspaceResponse'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    CourseResponse:
      type: object
      required:
        - id
        - name
        - day
        - start_time
        - end_time
        - workspace_id
      properties:
        id:
          type: integer
          example: 5
        name:
          type: string
          example: Introduction to Algorithms
        lecturer_name:
          type: string
          nullable: true
          example: Dr. Smith
        day:
          $ref: '#/components/schemas/DayOfWeek'
        start_time:
          type: string
          format: time
          example: '09:00:00'
        end_time:
          type: string
          format: time
          example: '10:30:00'
        workspace_id:
          type: integer
          example: 10
        workspace:
          $ref: '#/components/schemas/WorkspaceResponse'
          description: Embedded workspace (present when expanded)
    CourseCreateRequest:
      type: object
      required:
        - name
        - day
        - start_time
        - end_time
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          example: Introduction to Algorithms
        lecturer_name:
          type: string
          nullable: true
          example: Dr. Smith
        day:
          $ref: '#/components/schemas/DayOfWeek'
        start_time:
          type: string
          format: time
          example: '09:00:00'
        end_time:
          type: string
          format: time
          description: Must be after start_time
          example: '10:30:00'
    CourseUpdateRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        lecturer_name:
          type: string
          nullable: true
        day:
          $ref: '#/components/schemas/DayOfWeek'
        start_time:
          type: string
          format: time
        end_time:
          type: string
          format: time
          description: Must be after start_time
    CourseListResponse:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CourseResponse'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    CourseNoteResponse:
      type: object
      required:
        - id
        - title
        - course_id
        - created_by
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          example: 100
        title:
          type: string
          example: Week 1 Notes
        content:
