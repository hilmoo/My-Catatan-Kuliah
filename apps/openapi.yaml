openapi: 3.0.3
info:
  title: Workspace Management API
  version: 1.0.0
  description: 'API specification for managing users, workspaces, and pages.'
servers:
  - url: /api
    description: Base URL for API endpoints
paths:
  /auth/oauth/google:
    get:
      operationId: redirectToGoogleOAuth
      summary: Redirect to Google OAuth
      description: Initiates OAuth flow by redirecting to Google authorization endpoint
      responses:
        '302':
          description: Redirect to OAuth provider
      security: []
      tags:
        - Auth
  /auth/oauth/callback/google:
    get:
      operationId: handleGoogleOAuthCallback
      summary: Handle Google OAuth callback
      description: Handles OAuth provider callback with authorization code
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        '400':
          $ref: '#/components/responses/BadRequest'
      security: []
      tags:
        - Auth
  /pages:
    get:
      operationId: listPages
      summary: List pages
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: workspace_id
          in: query
          description: Filter by workspace ID
          schema:
            type: string
        - name: parent_id
          in: query
          description: Filter by parent page ID (null for root)
          schema:
            type: string
            nullable: true
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/PageType'
      responses:
        '200':
          $ref: '#/components/responses/ListPagesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - Pages
    post:
      operationId: createPage
      summary: Create a page
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PageCreate'
      responses:
        '201':
          $ref: '#/components/responses/CreatePageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - Pages
  '/pages/{id}':
    parameters:
      - $ref: '#/components/parameters/ResourceId'
    get:
      operationId: getPage
      summary: Get page details
      responses:
        '200':
          $ref: '#/components/responses/GetPageDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - Pages
    patch:
      operationId: updatePage
      summary: Update page
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PageUpdate'
      responses:
        '200':
          $ref: '#/components/responses/UpdatePageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - Pages
    delete:
      operationId: deletePage
      summary: Delete page
      responses:
        '204':
          description: Page deleted
      tags:
        - Pages
  /sessions:
    get:
      operationId: listSessions
      summary: List sessions
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          $ref: '#/components/responses/ListSessionsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - Sessions
    # post:
    #   operationId: createSession
    #   summary: Create a new session
    #   requestBody:
    #     required: true
    #     content:
    #       application/json:
    #         schema:
    #           $ref: '#/components/schemas/SessionCreate'
    #   responses:
    #     '201':
    #       $ref: '#/components/responses/CreateSessionResponse'
    #     '400':
    #       $ref: '#/components/responses/BadRequest'
    #     '500':
    #       $ref: '#/components/responses/InternalServerError'
    #   tags:
    #     - Sessions
  '/sessions/{id}':
    parameters:
      - name: id
        in: path
        description: Session token (used as identifier)
        required: true
        schema:
          type: string
    get:
      operationId: getSession
      summary: Get session details
      responses:
        '200':
          $ref: '#/components/responses/GetSessionDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - Sessions
    delete:
      operationId: deleteSession
      summary: Delete a session (Logout)
      responses:
        '204':
          description: Session deleted
      tags:
        - Sessions
