openapi: 3.0.3
info:
  title: Workspace Management API
  version: 1.0.0
  description: API specification for managing users, workspaces, and pages.
servers:
- url: /api
  description: Base URL for API endpoints
paths:
  /assignments:
    get:
      operationId: listAssignments
      summary: List assignments
      description: List of assignments
      parameters:
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      - $ref: '#/components/parameters/WorkspaceIdParam'
      - $ref: '#/components/parameters/ParentIdParam'
      responses:
        '200':
          $ref: '#/components/responses/AssignmentListResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
      - Assignments
    post:
      operationId: createAssignment
      summary: Create an assignment
      description: Create a new assignment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignmentCreate'
      responses:
        '201':
          $ref: '#/components/responses/AssignmentDetailResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
      - Assignments
  /assignments/{id}:
    parameters:
    - $ref: '#/components/parameters/ResourceId'
    get:
      operationId: getAssignment
      summary: Get assignment details
      description: Get details of a specific assignment
      responses:
        '200':
          $ref: '#/components/responses/AssignmentDetailResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
      - Assignments
    patch:
      operationId: updateAssignment
      summary: Update assignment
      description: Update an existing assignment
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignmentUpdate'
      responses:
        '200':
          $ref: '#/components/responses/AssignmentDetailResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
      - Assignments
    delete:
      operationId: deleteAssignment
      summary: Delete assignment
      description: Delete an assignment
      responses:
        '204':
          description: Assignment deleted
      tags:
      - Assignments
  /auth/oauth/google:
    get:
      operationId: redirectToGoogleOAuth
      summary: Redirect to Google OAuth
      description: Initiates OAuth flow by redirecting to Google authorization endpoint
      responses:
        '302':
          description: Redirect to Google OAuth authorization URL
      security: []
      tags:
      - Auth
  /auth/oauth/callback/google:
    get:
      operationId: handleGoogleOAuthCallback
      summary: Handle Google OAuth callback
      description: Handles the callback from Google OAuth, exchanges code for session
        token, and redirects to frontend with session token
      parameters:
      - name: code
        in: query
        description: Authorization code returned by Google
        required: true
        schema:
          type: string
      - name: state
        in: query
        description: State parameter for CSRF protection
        required: true
        schema:
          type: string
      responses:
        '307':
          description: Redirect to frontend with session token
          headers:
            Location:
              description: URL to redirect the user to, including session token
              schema:
                type: string
        '400':
          $ref: '#/components/responses/ErrorResponse'
      security: []
      tags:
      - Auth
  /courses:
    get:
      operationId: listCourses
      summary: List courses
      description: List all courses
      parameters:
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      - $ref: '#/components/parameters/WorkspaceIdParam'
      - $ref: '#/components/parameters/ParentIdParam'
      responses:
        '200':
          $ref: '#/components/responses/CourseListResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
      - Courses
    post:
      operationId: createCourse
      summary: Create a course
      description: Create a new course
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseCreate'
      responses:
        '201':
          $ref: '#/components/responses/CourseDetailResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
      - Courses
  /courses/{id}:
    parameters:
    - $ref: '#/components/parameters/ResourceId'
    get:
      operationId: getCourse
      summary: Get course details
      description: Get details of a specific course
      responses:
        '200':
          $ref: '#/components/responses/CourseDetailResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
      - Courses
    patch:
      operationId: updateCourse
      summary: Update course
      description: Update an existing course
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseUpdate'
      responses:
        '200':
          $ref: '#/components/responses/CourseDetailResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
      - Courses
    delete:
      operationId: deleteCourse
      summary: Delete course
      description: Delete a course
      responses:
        '204':
          description: Course deleted
      tags:
      - Courses
  /folders:
    get:
      operationId: listFolders
      summary: List folders
      description: List all folders
      parameters:
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      - $ref: '#/components/parameters/WorkspaceIdParam'
      - $ref: '#/components/parameters/ParentIdParam'
      responses:
        '200':
          $ref: '#/components/responses/FolderListResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
      - Folders
    post:
      operationId: createFolder
      summary: Create a folder
      description: Create a new folder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FolderCreate'
      responses:
        '201':
          $ref: '#/components/responses/FolderDetailResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
      - Folders
  /folders/{id}:
    parameters:
    - $ref: '#/components/parameters/ResourceId'
    get:
      operationId: getFolder
      summary: Get folder details
      description: Get details of a specific folder
      responses:
        '200':
          $ref: '#/components/responses/FolderDetailResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
      - Folders
    patch:
      operationId: updateFolder
      summary: Update folder
      description: Update an existing folder
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FolderUpdate'
      responses:
        '200':
          $ref: '#/components/responses/FolderDetailResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
      - Folders
    delete:
      operationId: deleteFolder
      summary: Delete folder
      description: Delete a folder
      responses:
        '204':
          description: Folder deleted
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
      - Folders
  /health:
    get:
      operationId: healthCheck
      summary: Health check endpoint
      description: Returns a simple status message to indicate the API is running.
      responses:
        '200':
          description: API is healthy
          content:
            application/vnd.health+json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
      tags:
      - Health
  /notes:
    get:
      operationId: listNotes
      summary: List notes
      description: List all notes
      parameters:
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      - $ref: '#/components/parameters/WorkspaceIdParam'
      - $ref: '#/components/parameters/ParentIdParam'
      responses:
        '200':
          $ref: '#/components/responses/NoteListResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
      - Notes
    post:
      operationId: createNote
      summary: Create a note
      description: Create a new note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NoteCreate'
      responses:
        '201':
          $ref: '#/components/responses/NoteDetailResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
      - Notes
  /notes/{id}:
    parameters:
    - $ref: '#/components/parameters/ResourceId'
    get:
      operationId: getNote
      summary: Get note details
      description: Get details of a specific note
      responses:
        '200':
          $ref: '#/components/responses/NoteDetailResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
      - Notes
    patch:
      operationId: updateNote
      summary: Update note
      description: Update an existing note
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NoteUpdate'
      responses:
        '200':
          $ref: '#/components/responses/NoteDetailResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
      - Notes
    delete:
      operationId: deleteNote
      summary: Delete note
      description: Delete a note
      responses:
        '204':
          description: Note deleted
      tags:
      - Notes
  /sessions:
    get:
      operationId: listSessions
      summary: List sessions
      description: List all sessions for the current user
      parameters:
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          $ref: '#/components/responses/SessionListResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
      - Sessions
  /sessions/{id}:
    parameters:
    - name: id
      in: path
      description: Session token (used as identifier)
      required: true
      schema:
        type: string
    get:
      operationId: getSession
      summary: Get session details
      description: Get details of a specific session
      responses:
        '200':
          $ref: '#/components/responses/SessionDetailResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
      - Sessions
    delete:
      operationId: deleteSession
      summary: Delete a session
      description: Delete a session
      responses:
        '204':
          description: Session deleted
      tags:
      - Sessions
  /workspaces:
    get:
      operationId: listWorkspaces
      summary: List workspaces
      description: List all workspaces for the current user
      parameters:
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      - name: owner_id
        in: query
        description: Filter by owner ID
        schema:
          type: string
      responses:
        '200':
          $ref: '#/components/responses/WorkspaceListResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
      - Workspaces
    post:
      operationId: createWorkspace
      summary: Create a workspace
      description: Create a new workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceCreate'
      responses:
        '201':
          $ref: '#/components/responses/WorkspaceCreateResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
      - Workspaces
  /workspaces/{id}:
    parameters:
    - $ref: '#/components/parameters/ResourceId'
    get:
      operationId: getWorkspace
      summary: Get workspace details
      description: Get details of a specific workspace
      responses:
        '200':
          $ref: '#/components/responses/WorkspaceDetailResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
      - Workspaces
    patch:
      operationId: updateWorkspace
      summary: Update workspace
      description: Update an existing workspace
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceCreate'
      responses:
        '200':
          $ref: '#/components/responses/WorkspaceUpdateResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
      - Workspaces
    delete:
      operationId: deleteWorkspace
      summary: Delete workspace
      description: Delete a workspace
      responses:
        '204':
          description: Workspace deleted
      tags:
      - Workspaces
components:
  parameters:
    LimitParam:
      description: Number of items to return per page
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100
        minimum: 1
    CursorParam:
      description: Cursor for pagination (last seen item ID)
      name: cursor
      in: query
      schema:
        type: string
    ParentIdParam:
      name: parent_id
      in: query
      description: Filter by parent page ID
      schema:
        type: string
    ResourceId:
      name: id
      in: path
      required: true
      description: Unique identifier of the resource.
      schema:
        type: string
    WorkspaceIdParam:
      name: workspace_id
      in: query
      description: Filter by workspace ID
      schema:
        type: string
  schemas:
    Assignment:
      allOf:
      - $ref: '#/components/schemas/PageBase'
      - type: object
        properties:
          properties:
            $ref: '#/components/schemas/AssignmentProperties'
    AssignmentCreate:
      allOf:
      - $ref: '#/components/schemas/PageBaseCreate'
      - type: object
        properties:
          properties:
            $ref: '#/components/schemas/AssignmentProperties'
        required:
          - parent_id
    AssignmentProperties:
      type: object
      properties:
        due_date:
          type: string
          format: date-time
        status:
          type: string
          default: todo
          enum:
          - todo
          - in_progress
          - done
    AssignmentUpdate:
      allOf:
      - $ref: '#/components/schemas/PageBaseUpdate'
      - type: object
        properties:
          properties:
            $ref: '#/components/schemas/AssignmentProperties'
    Course:
      allOf:
      - $ref: '#/components/schemas/PageBase'
      - type: object
        properties:
          properties:
            $ref: '#/components/schemas/CourseProperties'
    CourseCreate:
      allOf:
      - $ref: '#/components/schemas/PageBaseCreate'
      - type: object
        properties:
          properties:
            $ref: '#/components/schemas/CourseProperties'
    CourseProperties:
      type: object
      properties:
        subject:
          type: string
          example: Mathematics
        instructor:
          type: string
          example: Dr. Alan Turing
        semester:
          type: string
          example: Spring 2026
        credits:
          type: integer
          example: 3
        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
    CourseUpdate:
      allOf:
      - $ref: '#/components/schemas/PageBaseUpdate'
      - type: object
        properties:
          properties:
            $ref: '#/components/schemas/CourseProperties'
    Error:
      type: object
      properties:
        id:
          description: Error instance ID.
          type: string
          example: 123e4567-e89b-12d3-a456-426614174000
        reason:
          description: Human-readable reason.
          type: string
          example: Resource Not Found
        status:
          description: Status string (e.g., 'error').
          type: string
          example: Not Found
        error:
          description: Error type.
          type: string
          example: The requested resource could not be found
        code:
          description: Application-specific error code.
          type: integer
          example: 404
        details:
          description: Additional details about the error.
          type: object
          example:
            missingResource: assignment with ID 123 not found
      required:
      - id
      - reason
      - status
      - error
      - code
    Folder:
      allOf:
      - $ref: '#/components/schemas/PageBase'
      - type: object
        properties:
          type:
            type: string
            enum:
            - folder
          properties:
            $ref: '#/components/schemas/FolderProperties'
    FolderCreate:
      allOf:
      - $ref: '#/components/schemas/PageBaseCreate'
      - type: object
        properties:
          properties:
            $ref: '#/components/schemas/FolderProperties'
    FolderProperties:
      type: object
      properties:
        color:
          type: string
          example: '#3B82F6'
        sort_by:
          type: string
          example: title_asc
    FolderUpdate:
      allOf:
      - $ref: '#/components/schemas/PageBaseUpdate'
      - type: object
        properties:
          properties:
            $ref: '#/components/schemas/FolderProperties'
    Note:
      allOf:
      - $ref: '#/components/schemas/PageBase'
      - type: object
        properties:
          properties:
            $ref: '#/components/schemas/NoteProperties'
    NoteCreate:
      allOf:
      - $ref: '#/components/schemas/PageBaseCreate'
      - type: object
        properties:
          properties:
            $ref: '#/components/schemas/NoteProperties'
    NoteProperties:
      type: object
      properties:
        tags:
          type: array
          items:
            type: string
          example:
          - meeting-notes
          - q1-planning
        cover_image:
          type: string
          format: uri
          example: https://example.com/images/abstract-header.png
    NoteUpdate:
      allOf:
      - $ref: '#/components/schemas/PageBaseUpdate'
      - type: object
        properties:
          properties:
            $ref: '#/components/schemas/NoteProperties'
    PageBase:
      type: object
      properties:
        id:
          description: Unique identifier of the page.
          type: string
          example: CZM6ZsUwNuqZinoRDsMek
        workspace_id:
          description: ID of the workspace this page belongs to.
          type: string
          example: CZM6ZsUwNuqZinoRDsMek
        parent_id:
          description: ID of the parent page, null if it's a top-level page.
          type: string
          example: CZM6ZsUwNuqZinoRDsMek
        title:
          description: Title of the page.
          type: string
          example: My Page
        icon:
          description: Icon representing the page, can be an emoji or a URL to an
            image.
          type: string
          example: "\U0001F4C4"
        created_by:
          description: ID of the user who created the page. Empty for the current
            authenticated session.
          type: string
          example: CZM6ZsUwNuqZinoRDsMek
        created_at:
          description: Timestamp when the page was created.
          type: string
          format: date-time
          example: '2024-01-01T12:00:00Z'
        updated_at:
          description: Timestamp when the page was last updated.
          type: string
          format: date-time
          example: '2024-01-02T12:00:00Z'
    PageBaseCreate:
      type: object
      properties:
        workspace_id:
          type: string
        parent_id:
          type: string
          description: Folders can be nested under another folder. Courses can only be nested under folders. Assignments can only be nested under courses. Notes can be nested under folders, courses, or other notes. Only Assignments cannot be top-level pages.
        title:
          type: string
        content:
          type: string
        icon:
          type: string
      required:
      - workspace_id
      - title
      - content
    PageBaseUpdate:
      type: object
      properties:
        parent_id:
          type: string
        title:
          type: string
        content:
          type: string
        icon:
          type: string
    Pagination:
      type: object
      properties:
        next_cursor:
          type: string
        limit:
          type: integer
        has_more:
          type: boolean
    Session:
      description: User session
      type: object
      properties:
        user_id:
          description: User ID, empty for the current authenticated session.
          type: string
        id:
          description: Session token (identifier).
          type: string
        expires_at:
          type: string
          format: date-time
        ip_address:
          type: string
        user_agent:
          type: string
        created_at:
          type: string
          format: date-time
      required:
      - id
      - user_id
      - expires_at
      - created_at
    Workspace:
      type: object
      properties:
        id:
          description: Unique identifier.
          type: string
        name:
          description: Name of the workspace.
          type: string
        owner_id:
          description: ID of the user who owns the workspace, empty for the current
            authenticated session.
          type: string
        created_at:
          type: string
          format: date-time
      required:
      - id
      - name
      - owner_id
      - created_at
    WorkspaceCreate:
      type: object
      properties:
        name:
          type: string
      required:
      - name
  responses:
    AssignmentDetailResponse:
      description: Assignment details
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Assignment'
    AssignmentListResponse:
      description: List of assignments
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: '#/components/schemas/Assignment'
              pagination:
                $ref: '#/components/schemas/Pagination'
    CourseDetailResponse:
      description: Course details
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Course'
    CourseListResponse:
      description: List of courses
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: '#/components/schemas/Course'
              pagination:
                $ref: '#/components/schemas/Pagination'
    ErrorResponse:
      description: Generic error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    FolderDetailResponse:
      description: Folder details
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Folder'
    FolderListResponse:
      description: List of folders
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: '#/components/schemas/Folder'
              pagination:
                $ref: '#/components/schemas/Pagination'
    NoteDetailResponse:
      description: Note details
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Note'
    NoteListResponse:
      description: List of notes
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: '#/components/schemas/Note'
              pagination:
                $ref: '#/components/schemas/Pagination'
    SessionDetailResponse:
      description: Session details
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Session'
    SessionListResponse:
      description: List of sessions
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: '#/components/schemas/Session'
              pagination:
                $ref: '#/components/schemas/Pagination'
    WorkspaceCreateResponse:
      description: Workspace created
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Workspace'
    WorkspaceDetailResponse:
      description: Workspace details
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Workspace'
    WorkspaceListResponse:
