      deprecated: false
      description: ''
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          description: ''
          required: true
          example: ''
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
            example:
              username: janedoe
              email: jane@example.com
        required: true
      responses:
        '200':
          description: Updated user
          content:
