openapi: 3.0.1
info:
  title: Course Management API
  description: >
    REST API for managing users, workspaces, courses, course notes, and
    assignments. Authentication is handled via cookie-based sessions.
  version: 1.0.0
tags:
  - name: Auth
  - name: Users
  - name: Workspaces
  - name: Courses
  - name: Course Notes
  - name: Assignments
paths:
  /auth/register:
    post:
      summary: Register a new user
      deprecated: false
      description: ''
      tags:
        - Auth
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegisterRequest'
            example:
              username: johndoe
              email: john@example.com
              password: s3cr3tP@ss
        required: true
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
          headers: {}
        '400':
          description: Invalid request body or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: bad_request
                message: 'Validation failed: ''end_time'' must be after ''start_time''.'
          headers: {}
        '409':
          description: Unique constraint violation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: conflict
                message: A user with that email already exists.
          headers: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: internal_server_error
                message: An unexpected error occurred.
          headers: {}
      security: []
  /auth/login:
    post:
      summary: Log in and receive a session cookie
      deprecated: false
      description: ''
      tags:
        - Auth
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: john@example.com
              password: s3cr3tP@ss
        required: true
      responses:
        '200':
          description: Authenticated – session cookie is set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
          headers:
            Set-Cookie:
              required: false
              description: Session cookie (HttpOnly, Secure, SameSite=Lax)
              schema:
                type: string
                example: session=abc123; Path=/; HttpOnly; Secure; SameSite=Lax
        '400':
          description: Invalid request body or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: bad_request
                message: 'Validation failed: ''end_time'' must be after ''start_time''.'
          headers: {}
        '401':
          description: Missing or invalid session cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: unauthorized
                message: Authentication required.
          headers: {}
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: internal_server_error
                message: An unexpected error occurred.
          headers: {}
      security: []
  /auth/logout:
    post:
      summary: Log out and invalidate the session
      deprecated: false
      description: ''
      tags:
        - Auth
      parameters: []
      responses:
        '204':
          description: Logged out
          headers: {}
        '401':
