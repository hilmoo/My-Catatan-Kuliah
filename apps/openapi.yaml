openapi: 3.0.3
info:
  title: Workspace Management API
  version: 1.0.0
  description: 'API specification for managing users, workspaces, and pages.'
servers:
- url: /api
  description: Base URL for API endpoints
paths:
  /auth/oauth/google:
    get:
      operationId: redirectToGoogleOAuth
      summary: Redirect to Google OAuth
      description: Initiates OAuth flow by redirecting to Google authorization 
        endpoint
      responses:
        '302':
          description: Redirect to Google OAuth authorization URL
      security: []
      tags:
      - Auth
  /auth/oauth/callback/google:
    get:
      operationId: handleGoogleOAuthCallback
      summary: Handle Google OAuth callback
      description: 'Handles the callback from Google OAuth, exchanges code for session
        token, and redirects to frontend with session token'
      parameters:
      - name: code
        in: query
        description: Authorization code returned by Google
        required: true
        schema:
          type: string
      - name: state
        in: query
        description: State parameter for CSRF protection
        required: true
        schema:
          type: string
      responses:
        '307':
          description: Redirect to frontend with session token
          headers:
            Location:
              description: 'URL to redirect the user to, including session token'
              schema:
                type: string
        '400':
          $ref: '#/components/responses/ErrorResponse'
      security: []
      tags:
      - Auth
  /health:
    get:
      operationId: healthCheck
      summary: Health check endpoint
      description: Returns a simple status message to indicate the API is 
        running.
      responses:
        '204':
          description: API is healthy
      security: []
      tags:
      - Health
  /pages:
    get:
      operationId: listPages
      summary: List pages
      description: 'List all pages for the current user, with optional filtering by
        workspace, parent page, and type'
      parameters:
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      - $ref: '#/components/parameters/WorkspaceIdParam'
      - $ref: '#/components/parameters/ParentIdParam'
      - name: type
        in: query
        description: Filter by page type
        schema:
          type: string
          default: folder
          enum:
          - course
          - assignment
          - folder
          - note
      responses:
        '200':
          $ref: '#/components/responses/PageListResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
      - Pages
    post:
      operationId: createPage
      summary: Create a page
      description: 'Create a new page (course, assignment, folder, or note)'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PageCreate'
      responses:
        '201':
          $ref: '#/components/responses/PageDetailResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
      - Pages
  '/pages/{id}':
    parameters:
    - $ref: '#/components/parameters/ResourceId'
    get:
      operationId: getPage
      summary: Get page details
      description: Get details of a specific page
      responses:
        '200':
          $ref: '#/components/responses/PageDetailResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
      - Pages
    patch:
      operationId: updatePage
      summary: Update page
      description: 'Update an existing page (course, assignment, folder, or note)'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PageUpdate'
      responses:
        '200':
          $ref: '#/components/responses/PageDetailResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
      - Pages
    delete:
      operationId: deletePage
      summary: Delete page
      description: 'Delete a page (course, assignment, folder, or note)'
      responses:
        '204':
          description: Page deleted
      tags:
      - Pages
  /sessions:
    get:
      operationId: listSessions
      summary: List sessions
      description: List all sessions for the current user
      parameters:
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          $ref: '#/components/responses/SessionListResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
      - Sessions
  '/sessions/{id}':
    parameters:
    - name: id
      in: path
      description: Session token (used as identifier)
      required: true
      schema:
        type: string
    get:
      operationId: getSession
      summary: Get session details
      description: Get details of a specific session
      responses:
        '200':
          $ref: '#/components/responses/SessionDetailResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
      - Sessions
    delete:
      operationId: deleteSession
      summary: Delete a session
      description: Delete a session
      responses:
        '204':
          description: Session deleted
      tags:
      - Sessions
  /workspaces:
    get:
      operationId: listWorkspaces
      summary: List workspaces
      description: List all workspaces for the current user
      parameters:
      - $ref: '#/components/parameters/CursorParam'
      - $ref: '#/components/parameters/LimitParam'
      - name: owner_id
        in: query
        description: Filter by owner ID
        schema:
          type: string
      responses:
        '200':
          $ref: '#/components/responses/WorkspaceListResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
      - Workspaces
    post:
      operationId: createWorkspace
      summary: Create a workspace
      description: Create a new workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceCreate'
      responses:
        '201':
          $ref: '#/components/responses/WorkspaceCreateResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
      - Workspaces
  '/workspaces/{id}':
    parameters:
    - $ref: '#/components/parameters/ResourceId'
    get:
      operationId: getWorkspace
      summary: Get workspace details
      description: Get details of a specific workspace
      responses:
        '200':
          $ref: '#/components/responses/WorkspaceDetailResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
      - Workspaces
    patch:
      operationId: updateWorkspace
      summary: Update workspace
      description: Update an existing workspace
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceUpdate'
      responses:
        '200':
          $ref: '#/components/responses/WorkspaceUpdateResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
      - Workspaces
    delete:
      operationId: deleteWorkspace
      summary: Delete workspace
      description: Delete a workspace
      responses:
        '204':
          description: Workspace deleted
      tags:
      - Workspaces
components:
  parameters:
    CursorParam:
      description: Cursor for pagination (last seen item ID)
      name: cursor
      in: query
      schema:
        type: string
    LimitParam:
      description: Number of items to return per page
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100
        minimum: 1
    ParentIdParam:
      name: parent_id
      in: query
      description: Filter by parent page ID
      schema:
        type: string
    ResourceId:
      name: id
      in: path
      required: true
      description: Unique identifier of the resource.
      schema:
        type: string
    WorkspaceIdParam:
      name: workspace_id
      in: query
      description: Filter by workspace ID
      schema:
        type: string
  schemas:
    Error:
      type: object
      properties:
        id:
          description: Error instance ID.
          type: string
          example: 123e4567-e89b-12d3-a456-426614174000
        reason:
          description: Human-readable reason.
          type: string
          example: Resource Not Found
        status:
          description: 'Status string (e.g., ''error'').'
          type: string
          example: Not Found
        message:
          description: Error type.
          type: string
          example: The requested resource could not be found
        code:
          description: Application-specific error code.
          type: integer
          example: 404
        details:
          description: Additional details about the error.
          type: object
          example:
            missingResource: assignment with ID 123 not found
      required:
      - id
      - reason
      - status
      - error
      - code
    PageBase:
      type: object
      properties:
        id:
          description: Unique identifier of the page.
          type: string
          example: CZM6ZsUwNuqZinoRDsMek
        workspace_id:
          description: ID of the workspace this page belongs to.
          type: string
          example: CZM6ZsUwNuqZinoRDsMek
        parent_id:
          description: 'ID of the parent page, null if it''s a top-level page.'
          type: string
          example: CZM6ZsUwNuqZinoRDsMek
        title:
          description: Title of the page.
          type: string
          example: My Page
        icon:
          description: 'Icon representing the page, can be an emoji or a URL to an
            image.'
          type: string
          example: "📄"
        created_by:
          description: ID of the user who created the page. authenticated 
            session.
          type: string
          example: CZM6ZsUwNuqZinoRDsMek
        created_at:
          description: Timestamp when the page was created.
          type: string
          format: date-time
          example: '2024-01-01T12:00:00Z'
        updated_at:
          description: Timestamp when the page was last updated.
          type: string
          format: date-time
          example: '2024-01-02T12:00:00Z'
    PageBaseCreate:
      type: object
      properties:
        workspace_id:
          type: string
        parent_id:
          description: 'Folders can be nested under another folder. Courses can only
            be nested under folders. Assignments can only be nested under courses.
            Notes can be nested under folders, courses, or other notes. Only Assignments
            cannot be top-level pages.'
          type: string
        title:
          description: 'For folders, it''s the folder name. For courses, it''s the
            course name. For assignments, it''s the assignment name. For notes, it''s
            the note title.'
          type: string
        icon:
          description: 'Icon representing the page, can be an emoji or a URL to an
            image.'
          type: string
        type:
          description: 'The type of the page, which determines its properties and
            behavior.'
          type: string
          enum:
          - course
          - assignment
          - folder
          - note
      required:
      - workspace_id
      - title
      - type
    PageBaseUpdate:
      type: object
      properties:
        parent_id:
          type: string
        title:
          type: string
        icon:
          type: string
    PageAllProperties:
      oneOf:
      - $ref: '#/components/schemas/PagePropertiesCourse'
      - $ref: '#/components/schemas/PagePropertiesAssignment'
      - $ref: '#/components/schemas/PagePropertiesFolder'
      - $ref: '#/components/schemas/PagePropertiesNote'
    PageCreate:
      allOf:
      - $ref: '#/components/schemas/PageBaseCreate'
      - type: object
        properties:
          properties:
            $ref: '#/components/schemas/PageAllProperties'
    PageDetail:
      allOf:
      - $ref: '#/components/schemas/PageBase'
      - type: object
        properties:
          properties:
            $ref: '#/components/schemas/PageAllProperties'
    PagePropertiesAssignment:
      type: object
      properties:
        due_date:
          type: string
          format: date-time
        status:
          type: string
          default: todo
          enum:
          - todo
          - in_progress
          - done
    PagePropertiesCourse:
      type: object
      properties:
        subject:
          type: string
          example: Mathematics
        instructor:
          type: string
          example: Dr. Alan Turing
        semester:
          type: string
          example: Spring 2026
        credits:
          type: integer
          example: 3
        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
    PagePropertiesFolder:
      type: object
      properties:
        color:
          type: string
          example: '#3B82F6'
        sort_by:
          type: string
          example: title_asc
    PagePropertiesNote:
      type: object
      properties:
        tags:
          type: array
          items:
            type: string
          example:
          - meeting-notes
          - q1-planning
        cover_image:
          type: string
          format: uri
          example: 'https://example.com/images/abstract-header.png'
    PageUpdate:
      allOf:
      - $ref: '#/components/schemas/PageBaseUpdate'
      - type: object
        properties:
          properties:
            $ref: '#/components/schemas/PageAllProperties'
    Pagination:
      type: object
      properties:
        next_cursor:
          type: string
        limit:
          type: integer
        has_more:
          type: boolean
    Session:
      description: User session
      type: object
      properties:
        user_id:
          description: User ID.
          type: string
        id:
          description: Session token (identifier).
          type: string
        expires_at:
          type: string
          format: date-time
        ip_address:
          type: string
        user_agent:
          type: string
        created_at:
          type: string
          format: date-time
      required:
      - id
      - user_id
      - expires_at
      - created_at
    Workspace:
      type: object
      properties:
        id:
          description: Unique identifier.
          type: string
        name:
          description: Name of the workspace.
          type: string
        owner_id:
          description: ID of the user who owns the workspace authenticated 
            session.
          type: string
        created_at:
          type: string
          format: date-time
      required:
      - id
      - name
      - owner_id
      - created_at
    WorkspaceCreate:
      type: object
      properties:
        name:
          type: string
      required:
      - name
    WorkspaceUpdate:
      type: object
      properties:
        name:
          type: string
  responses:
    ErrorResponse:
      description: Generic error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    PageDetailResponse:
      description: Page details
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PageDetail'
    PageListResponse:
      description: List of pages
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: '#/components/schemas/PageDetail'
              pagination:
                $ref: '#/components/schemas/Pagination'
    SessionDetailResponse:
      description: Session details
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Session'
    SessionListResponse:
      description: List of sessions
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: '#/components/schemas/Session'
              pagination:
                $ref: '#/components/schemas/Pagination'
    WorkspaceCreateResponse:
      description: Workspace created
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Workspace'
    WorkspaceDetailResponse:
      description: Workspace details
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Workspace'
    WorkspaceListResponse:
      description: List of workspaces
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: '#/components/schemas/Workspace'
              pagination:
                $ref: '#/components/schemas/Pagination'
    WorkspaceUpdateResponse:
      description: Workspace updated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Workspace'
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session
tags:
- name: Auth
  description: Authentication operations
- name: Health
  description: API health check endpoint
- name: Pages
  description: Page management operations
- name: Sessions
  description: Session management operations
- name: Workspaces
  description: Workspace operations
security:
- cookieAuth: []
