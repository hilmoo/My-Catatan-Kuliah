name: CI - AI

on:
  push:
    branches:
      - main
    paths:
      - "ai/**"
  pull_request:
    branches:
      - main
    paths:
      - "ai/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Sync
        run: uv sync --locked --all-extras --dev
      - name: Check
        run: uv run ruff check

  format:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Sync
        run: uv sync --locked --all-extras --dev
      - name: Format
        run: uv run ruff format --check --diff
